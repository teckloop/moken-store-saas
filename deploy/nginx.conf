# Moken Store SaaS — Nginx site config
# Replaces the local edge-router script.
# Save as: /etc/nginx/sites-available/moken
# Then: ln -s /etc/nginx/sites-available/moken /etc/nginx/sites-enabled/

upstream moken_api {
  server 127.0.0.1:4100;
  keepalive 32;
}

# Serve all static apps from the dist/ folders built by `npm run build`.
# Each app is a Vite SPA — fall back to index.html for client routing.

# ====================================================
# API — api.moken-saas.online
# ====================================================
server {
  listen 80;
  listen [::]:80;
  server_name api.moken-saas.online;

  client_max_body_size 60M;

  location / {
    proxy_pass         http://moken_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   x-store-domain    $http_x_store_domain;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 90s;
  }
}

# ====================================================
# Company admin — company.moken-saas.online
# ====================================================
server {
  listen 80;
  listen [::]:80;
  server_name company.moken-saas.online;

  root /var/www/moken/apps/company-admin/dist;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  location /assets/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri /index.html;
  }
}

# ====================================================
# Store admin (merchant) — merchant.moken-saas.online
# ====================================================
server {
  listen 80;
  listen [::]:80;
  server_name merchant.moken-saas.online;

  root /var/www/moken/apps/store-admin/dist;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  location /assets/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri /index.html;
  }
}

# ====================================================
# Landing — moken-saas.online + www
# ====================================================
server {
  listen 80;
  listen [::]:80;
  server_name moken-saas.online www.moken-saas.online;

  root /var/www/moken/apps/web/dist;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  location /assets/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri /index.html;
  }
}

# ====================================================
# Storefront — store.* AND any other subdomain (wildcard)
# Any *.moken-saas.online that isn't matched above falls here.
# This is how new tenants work automatically.
# ====================================================
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name store.moken-saas.online *.moken-saas.online;

  root /var/www/moken/apps/storefront/dist;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  location /assets/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
  }

  # Serve uploaded images directly from the API's data folder for speed
  location /uploads/ {
    alias /var/www/moken/apps/api/data/uploads/;
    expires 365d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
